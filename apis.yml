created: '2026-03-24'
modified: '2026-05-02'
description: >-
  Rent-A-Center is a lease-to-own retail company providing furniture, electronics,
  appliances, and computers through its Rent-A-Center stores and Acima (formerly
  AcceptanceNOW) in-store kiosk program. Headquartered in Plano, Texas, Rent-A-Center
  operates thousands of stores across the United States, Mexico, and Puerto Rico.
  The company's technology platform supports online store management, customer account
  self-service, lease agreement processing, and the Preferred Lease virtual store
  integration program for retail partners. No public developer API is currently
  documented. The Acima platform provides a lease-to-own integration capability for
  partner retailers via a separate developer program.
